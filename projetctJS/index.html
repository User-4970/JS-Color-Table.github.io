<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link rel="stylesheet" href="style.css">
  <script src="src/lesson3.js" defer></script>
</head>
<body>

<div class="controls">

  <label for="height">Height of canvas</label>
  <input type="number" id="height">

  <label for="width">Width of canvas</label>
  <input type="number" id="width">

  <label for="color">Color</label>
  <input type="color" id="color">

  <label for="eraser">Erase mode</label>
  <input type="checkbox" id="eraser">

  <label for="randerColor">Random color</label>
  <input type="checkbox" id="randerColor">

  <button id="apply">Apply</button>
  <button id="clearColor">Clean table</button>
  <button id="clearCanvas">Clear canvas</button>

</div>

<table id="canvas"></table>

</body>
</html>
